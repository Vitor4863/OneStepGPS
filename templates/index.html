<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClubLifter - Global Navigation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #map { height: 620px; width: 100%; border-radius: 15px; border: 2px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card { background: #161b22; border: 1px solid #30363d; color: white; border-radius: 15px; }
        .form-control { background: #0d1117; border: 1px solid #30363d; color: white; }
        .form-control:focus { background: #0d1117; color: white; border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        .btn-primary { background: linear-gradient(45deg, #a855f7, #6d28d9); border: none; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        
        .leaflet-routing-container { display: none !important; } 
        .sidebar-scroll { max-height: 380px; overflow-y: auto; scrollbar-width: thin; }
        .text-primary { color: #a855f7 !important; }
        
        /* Scrollbar styling */
        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="py-4">

<div class="container-fluid px-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow mb-4">
                <h4 class="text-primary fw-bold mb-3">ClubLifter</h4>
                <form id="markerForm">
                    <div class="mb-2">
                        <label class="small text-secondary">Customer Name</label>
                        <input type="text" name="nome" class="form-control" placeholder="e.g., John Smith" required>
                    </div>
                    <div class="mb-2">
                        <label class="small text-secondary">Postal Code or ZIP Code</label>
                        <input type="text" name="cep" class="form-control" placeholder="24020350 or 10036" required>
                    </div>
                    <div class="mb-3">
                        <label class="small text-secondary">Street Number</label>
                        <input type="text" name="numero" class="form-control" placeholder="123">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">GENERATE NAVIGATION ROUTE</button>
                </form>
                <div id="status" class="mt-3 small fw-bold text-center"></div>
            </div>

            <div class="card p-3 shadow">
                <h6 class="text-secondary border-bottom border-secondary pb-2 mb-2">Delivery History</h6>
                <div class="sidebar-scroll">
                    <table class="table table-dark table-sm small" id="tabelaDados">
                        <thead><tr><th>Customer</th><th class="text-end">Distance</th></tr></thead>
                        <tbody>
                            {% for c in clientes %}
                            <tr><td>{{ c.nome }}</td><td class="text-end text-primary">{{ c.distancia }} km</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div id="map"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    // Initialize map focused on Niterói (Base)
    var map = L.map('map').setView([-22.8833, -43.1033], 13);
    
    // Dark Mode Tile Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© ClubLifter Logistics'
    }).addTo(map);

    var rotaAtual = null;
    var camadaLinha = L.layerGroup().addTo(map); 

    document.getElementById('markerForm').onsubmit = async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        const formData = new FormData(e.target);
        
        status.className = "mt-3 small fw-bold text-center text-info";
        status.innerHTML = "⏳ Calculating optimal route...";

        try {
            const res = await fetch('/cadastrar_cep', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                // Clear previous layers
                if (rotaAtual) map.removeControl(rotaAtual);
                camadaLinha.clearLayers();

                const p_mot = L.latLng(data.motorista_coords.lat, data.motorista_coords.lng);
                const p_cli = L.latLng(data.cliente_coords.lat, data.cliente_coords.lng);

                // Route Configuration
                rotaAtual = L.Routing.control({
                    waypoints: [p_mot, p_cli],
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1',
                        profile: 'car'
                    }),
                    lineOptions: {
                        styles: [
                            { color: '#a855f7', opacity: 0.8, weight: 6 } // Neon Purple
                        ]
                    },
                    show: false,
                    addWaypoints: false,
                    createMarker: function(i, wp) {
                        const icon = i === 0 ? "🚚" : "📍";
                        const label = i === 0 ? "Driver" : data.nome;
                        return L.marker(wp.latLng).bindPopup(`<b>${icon} ${label}</b>`);
                    }
                }).addTo(map);

                // Event: Road route not found (International/Overseas)
                rotaAtual.on('routingerror', function() {
                    status.innerHTML = "<span class='text-warning'>✈️ International Route (Air Connection)</span>";
                    L.polyline([p_mot, p_cli], {
                        color: '#a855f7',
                        weight: 3,
                        dashArray: '10, 15',
                        opacity: 0.7
                    }).addTo(camadaLinha);
                });

                // Event: Road route success
                rotaAtual.on('routesfound', function(e) {
                    status.innerHTML = "<span class='text-success'>✅ Ground route optimized!</span>";
                });

                // Smooth zoom adjustment
                map.flyToBounds([p_mot, p_cli], { padding: [100, 100], duration: 1.5 });

                // Update History Table
                const novaLinha = `<tr><td>${data.nome || formData.get('nome')}</td><td class="text-end text-primary">${data.distancia} km</td></tr>`;
                document.querySelector("#tabelaDados tbody").insertAdjacentHTML('afterbegin', novaLinha);
                
                e.target.reset();

            } else {
                status.innerHTML = `<span class='text-danger'>❌ ${data.error}</span>`;
            }
        } catch (err) {
            status.innerHTML = "<span class='text-danger'>❌ Server communication failure.</span>";
            console.error(err);
        }
    };
</script>
</body>
</html>
