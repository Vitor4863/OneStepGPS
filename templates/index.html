<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClubLifter - Global Navigation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #map { height: 620px; width: 100%; border-radius: 15px; border: 2px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card { background: #161b22; border: 1px solid #30363d; color: white; border-radius: 15px; }
        .form-control, .form-select { background: #0d1117; border: 1px solid #30363d; color: white; }
        .form-control:focus, .form-select:focus { background: #0d1117; color: white; border-color: #a855f7; box-shadow: 0 0 10px rgba(168,85,247,0.4); }
        .form-select option { background: #161b22; color: white; }
        .btn-primary { background: linear-gradient(45deg, #a855f7, #6d28d9); border: none; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168,85,247,0.4); }
        .btn-logout { background: transparent; border: 1px solid #30363d; color: #8b949e; font-size: 0.8rem; transition: 0.2s; }
        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }
        .leaflet-routing-container { display: none !important; }
        .sidebar-scroll { max-height: 250px; overflow-y: auto; scrollbar-width: thin; }
        .text-primary { color: #a855f7 !important; }
        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .admin-link { color: #a855f7; font-size: 0.8rem; text-decoration: none; }
        .admin-link:hover { color: #c084fc; }
        .driver-result { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.3); border-radius: 10px; padding: 10px 14px; margin-top: 10px; display: none; }
        .driver-result .driver-name  { font-weight: bold; color: #a855f7; }
        .driver-result .driver-phone { color: #22c55e; font-size: 0.9rem; }
        /* US datetime styling */
        .datetime-row { display: flex; gap: 8px; }
        .datetime-row .form-control { flex: 1; }
        select.form-control option { background: #161b22; }
    </style>
</head>
<body class="py-4">

<div class="container-fluid px-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow mb-4">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="text-primary fw-bold mb-0">ClubLifter</h4>
                    <div class="d-flex gap-2 align-items-center">
                        {% if session.get('role') == 'master' %}
                        <a href="/admin/packages" class="admin-link">Packages</a>
                        <a href="/admin/drivers"  class="admin-link">Drivers</a>
                        <a href="/admin/users"    class="admin-link">Users</a>
                        {% endif %}
                        <a href="/logout" class="btn btn-logout btn-sm px-2">Logout</a>
                    </div>
                </div>

                <form id="markerForm">
                    <div class="mb-2">
                        <label class="small text-secondary">Customer Name</label>
                        <input type="text" name="nome" class="form-control" placeholder="e.g., John Smith" required>
                    </div>
                    <div class="mb-2">
                        <label class="small text-secondary">Postal Code or ZIP Code</label>
                        <input type="text" name="cep" class="form-control" placeholder="e.g., 89109" required>
                    </div>
                    <div class="mb-2">
                        <label class="small text-secondary">Street Number</label>
                        <input type="text" name="numero" class="form-control" placeholder="123">
                    </div>
                    <div class="mb-2">
                        <label class="small text-secondary">Party Package</label>
                        <select name="package" class="form-control form-select" required>
                            <option value="" disabled selected>Select a package</option>
                            {% for p in packages %}
                            <option value="{{ p.name }}">{{ p.name }}{% if p.price > 0 %} — ${{ "%.2f"|format(p.price) }}{% endif %}{% if p.max_guests %} (up to {{ p.max_guests }} guests){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="small text-secondary">Number of Guests</label>
                        <input type="number" name="guests" class="form-control" placeholder="e.g., 10" min="1" required>
                    </div>

                    <!-- US Format Date & Time -->
                    <div class="mb-3">
                        <label class="small text-secondary">Pickup Date & Time</label>
                        <div class="datetime-row">
                            <!-- Date: MM/DD/YYYY -->
                            <input type="text" name="pickup_date" id="pickupDate" class="form-control"
                                placeholder="MM/DD/YYYY" maxlength="10"
                                pattern="\d{2}/\d{2}/\d{4}" required>
                            <!-- Hour -->
                            <select name="pickup_hour" class="form-control form-select" style="max-width:75px;" required>
                                <option value="" disabled selected>Hr</option>
                                {% for h in range(1,13) %}
                                <option value="{{ '%02d'|format(h) }}">{{ '%02d'|format(h) }}</option>
                                {% endfor %}
                            </select>
                            <!-- Minute -->
                            <select name="pickup_min" class="form-control form-select" style="max-width:75px;" required>
                                <option value="" disabled selected>Min</option>
                                <option value="00">00</option>
                                <option value="15">15</option>
                                <option value="30">30</option>
                                <option value="45">45</option>
                            </select>
                            <!-- AM/PM -->
                            <select name="pickup_ampm" class="form-control form-select" style="max-width:75px;" required>
                                <option value="" disabled selected>—</option>
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                        <div class="small text-secondary mt-1" id="dateError" style="color:#ef4444!important;display:none;">Invalid date format</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">SCHEDULE CLIENT PICKUP</button>
                </form>

                <!-- Driver result box -->
                <div class="driver-result" id="driverResult">
                    <div class="small text-secondary mb-1">Nearest Driver</div>
                    <div class="driver-name" id="driverName">—</div>
                    <div class="driver-phone" id="driverPhone"></div>
                    <div class="small text-secondary mt-1" id="driverDist"></div>
                </div>

                <div id="status" class="mt-3 small fw-bold text-center"></div>
            </div>

            <!-- History -->
            <div class="card p-3 shadow">
                <h6 class="text-secondary border-bottom border-secondary pb-2 mb-2">Pickup History</h6>
                <div class="sidebar-scroll">
                    <table class="table table-dark table-sm small" id="tabelaDados">
                        <thead><tr><th>Customer</th><th>Package</th><th>Guests</th><th class="text-end">Distance</th></tr></thead>
                        <tbody>
                            {% for c in clientes %}
                            <tr>
                                <td>{{ c.nome }}</td>
                                <td>{{ c.package }}</td>
                                <td>{{ c.guests }}</td>
                                <td class="text-end text-primary">{{ c.distancia }} km</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div id="map"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script>
    // Auto-format date input as MM/DD/YYYY
    document.getElementById('pickupDate').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length >= 3 && v.length <= 4) v = v.slice(0,2) + '/' + v.slice(2);
        else if (v.length > 4) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4,8);
        e.target.value = v;
    });

    var map = L.map('map').setView([36.1699, -115.1398], 12); // Las Vegas
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© ClubLifter Logistics'
    }).addTo(map);

    var rotaAtual   = null;
    var camadaLinha = L.layerGroup().addTo(map);

    document.getElementById('markerForm').onsubmit = async (e) => {
        e.preventDefault();
        const status   = document.getElementById('status');
        const formData = new FormData(e.target);

        // Validate date
        const dateVal = formData.get('pickup_date');
        const dateRegex = /^\d{2}\/\d{2}\/\d{4}$/;
        if (!dateRegex.test(dateVal)) {
            document.getElementById('dateError').style.display = 'block';
            return;
        }
        document.getElementById('dateError').style.display = 'none';

        // Combine into single pickup_datetime string
        const pickup_datetime = `${formData.get('pickup_date')} ${formData.get('pickup_hour')}:${formData.get('pickup_min')} ${formData.get('pickup_ampm')}`;
        formData.append('pickup_datetime', pickup_datetime);

        status.className = "mt-3 small fw-bold text-center text-info";
        status.innerHTML = "⏳ Scheduling client pickup...";
        document.getElementById('driverResult').style.display = 'none';

        try {
            const res  = await fetch('/cadastrar_cep', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                if (rotaAtual) map.removeControl(rotaAtual);
                camadaLinha.clearLayers();

                const p_mot = L.latLng(data.motorista_coords.lat, data.motorista_coords.lng);
                const p_cli = L.latLng(data.cliente_coords.lat, data.cliente_coords.lng);

                rotaAtual = L.Routing.control({
                    waypoints: [p_mot, p_cli],
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1',
                        profile: 'car'
                    }),
                    lineOptions: { styles: [{ color: '#a855f7', opacity: 0.8, weight: 6 }] },
                    show: false,
                    addWaypoints: false,
                    createMarker: function(i, wp) {
                        const icon  = i === 0 ? "🚗" : "📍";
                        const label = i === 0 ? "Driver" : (data.nome || formData.get('nome'));
                        return L.marker(wp.latLng).bindPopup(`<b>${icon} ${label}</b>`);
                    }
                }).addTo(map);

                rotaAtual.on('routingerror', function() {
                    status.innerHTML = "<span class='text-warning'>✈️ International Route (Air Connection)</span>";
                    L.polyline([p_mot, p_cli], { color: '#a855f7', weight: 3, dashArray: '10, 15', opacity: 0.7 }).addTo(camadaLinha);
                });

                rotaAtual.on('routesfound', function() {
                    status.innerHTML = "<span class='text-success'>✅ Pickup scheduled successfully!</span>";
                });

                map.flyToBounds([p_mot, p_cli], { padding: [100, 100], duration: 1.5 });

                // Show driver result box
                document.getElementById('driverResult').style.display = 'block';
                document.getElementById('driverName').innerText = data.motorista;
                document.getElementById('driverDist').innerText = `📍 ${data.distancia} km away`;
                const phoneEl = document.getElementById('driverPhone');
                if (data.motorista_phone) {
                    phoneEl.innerHTML = `📞 <a href="tel:${data.motorista_phone}" style="color:#22c55e;">${data.motorista_phone}</a>`;
                } else {
                    phoneEl.innerHTML = `<span class="text-secondary">No phone registered</span>`;
                }

                // Update history table
                const novaLinha = `<tr>
                    <td>${data.nome || formData.get('nome')}</td>
                    <td>${formData.get('package')}</td>
                    <td>${formData.get('guests')}</td>
                    <td class="text-end text-primary">${data.distancia} km</td>
                </tr>`;
                document.querySelector("#tabelaDados tbody").insertAdjacentHTML('afterbegin', novaLinha);
                e.target.reset();

            } else {
                status.innerHTML = `<span class='text-danger'>❌ ${data.error}</span>`;
            }
        } catch (err) {
            status.innerHTML = "<span class='text-danger'>❌ Server communication failure.</span>";
            console.error(err);
        }
    };
</script>
</body>
</html>
